<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error Reality</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            font-family: 'Montserrat', sans-serif;
            color: #ffe100;
            padding: 15px;
            min-height: 100vh;
        }

        .container {
            max-width: 100%;
            margin: auto;
        }

        h1 {
            color: #ffe100;
            text-align: center;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(255, 255, 0, 0.5);
            font-size: 2em;
            letter-spacing: 2px;
            font-weight: 600;
        }

        .subtitle {
            text-align: center;
            color: #ffe100;
            margin-bottom: 20px;
            font-size: 0.9em;
            font-weight: 400;
        }

        /* ===== PROGRESS BAR ===== */
        .progress-container {
            margin: 20px 0;
            border: 0.5px solid rgba(255, 255, 255, 0.5);
            border-radius: 8px;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
        }

        .progress-label {
            color: #ffe100;
            font-size: 0.7em;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: 400;
        }

        .progress-bar {
            width: 100%;
            height: 25px;
            background: rgba(0, 0, 0, 0.5);
            border: 0.5px solid rgba(255, 255, 255, 0.5);
            border-radius: 6px;
            overflow: hidden;
            position: relative;
        }

        .core-subtext {
            margin-top: 8px;
            font-size: 0.75em;
            color: #ffffff;
            opacity: 0.8;
            line-height: 1.4;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffe100, #ffe100);
            width: 0%;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7em;
            color: #000;
            font-weight: 600;
            border-radius: 6px;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .progress-percent {
            text-align: left;
            color: #ffe100;
            margin-top: 5px;
            font-size: 0.75em;
            font-weight: 400;
        }

        /* ===== STATUS BOXES ===== */
        .status-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .box {
            border: 0.5px solid rgba(255, 255, 255, 0.5);
            border-radius: 8px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .box:hover {
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .box-title {
            color: #ffe100;
            font-size: 0.7em;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 400;
        }

        .box-value {
            color: #ffe100;
            font-size: 1.1em;
            font-weight: 600;
        }

        .task-box {
            border: 0.5px solid rgba(255, 255, 255, 0.5);
            border-radius: 8px;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        .task-title {
            color: #ffe100;
            font-size: 0.7em;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            font-weight: 400;
        }

        .task-text {
            color: #ffffff;
            font-size: 1em;
            font-weight: 600;
            line-height: 1.5;
        }

        .section-title {
            font-size: 0.7em;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 400;
            color: #ffe100;
        }

        /* ===== MODULES & PUZZLES ===== */
        .module {
            border: 0.5px solid rgba(255, 255, 255, 0.5);
            border-radius: 8px;
            margin-bottom: 10px;
            overflow: hidden;
        }

        .module summary {
            padding: 14px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            list-style: none;
            user-select: none;
        }

        .module.disabled-summary summary {
            cursor: not-allowed;
            opacity: 0.6;
        }

        .module-content {
            padding: 14px;
            border-top: 0.5px solid rgba(255,255,255,0.2);
            font-size: 0.85em;
            color: #ffffff;
        }

        .puzzle-container {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .puzzle-text {
            color: #cccccc;
            line-height: 1.4;
        }

        .puzzle-input-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            flex-wrap: wrap;
        }

        .puzzle-input {
            flex: 1;
            background: #111;
            border: 0.5px solid #ffe100;
            border-radius: 4px;
            padding: 8px;
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9em;
        }

        .puzzle-input:focus {
            outline: none;
            box-shadow: 0 0 5px rgba(255, 225, 0, 0.5);
        }

        /* Input letter lines wrapper */
        .letter-inputs-container {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        /* Horizontal input line styling */
        .char-input {
            width: 35px;
            height: 40px;
            background: transparent;
            border: none;
            border-bottom: 2px solid #ffe100;
            color: #ffffff;
            text-align: center;
            font-size: 1.4em;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            text-transform: uppercase;
        }

        .char-input:focus {
            outline: none;
            border-bottom-color: #ffffff;
            box-shadow: 0 4px 6px -2px rgba(255, 225, 0, 0.3);
        }

        /* NO BORDERS ON IMAGE WRAPPERS */
        .puzzle-image-wrapper {
            width: 100%;
            max-width: 200px;
            margin: 15px auto;
            border: none;
            border-radius: 0;
            overflow: hidden;
            background: transparent;
            display: flex;
            justify-content: center;
        }

        .puzzle-img {
            width: 100%;
            display: block;
            height: auto;
        }

        .single-choice {
            width: 50px;
            font-size: 1.6em;
        }

        .puzzle-btn {
            background: #ffe100;
            color: #000000;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.8em;
        }

        .puzzle-btn:hover {
            background: #ffffff;
            box-shadow: 0 0 10px rgba(255, 225, 0, 0.4);
        }

        .puzzle-error {
            color: #ff007f;
            font-size: 0.8em;
            display: none;
        }

        .badge {
            float: right;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7em;
            font-weight: 600;
        }

        .locked { background: #ff007f; color: white; }
        .unlocked { background: #ffe100; color: black; }
        .restored { background: #ffe100; color: black; opacity: 0.5; }

        /* ===== LOGS SECTION ===== */
        .archive-section {
            border: 0.5px solid rgba(255, 255, 255, 0.5);
            border-radius: 8px;
            padding: 5px;
            background: rgba(0, 0, 0, 0.3);
        }

        .archive-title {
            color: #ffe100;
            font-size: 0.75em;
            text-transform: uppercase;
            margin-bottom: 12px;
            letter-spacing: 1px;
            font-weight: 400;
        }

        .archive-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .archive-item {
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.2);
            padding: 10px 0;
            font-size: 0.75em;
        }

        .archive-item:last-child { border-bottom: none; }
        .archive-timestamp { color: #ffe100; font-weight: 600; }
        .archive-type { color: #ffffff; margin: 2px 0; font-weight: 400; }
        .archive-data { color: #cccccc; font-size: 0.7em; margin-top: 2px; font-weight: 400; }

        .archive-empty {
            color: #bbbbbb;
            text-align: left;
            font-weight: 400;
            font-size: 0.85em;
            line-height: 1.6;
        }

        /* ===== CONNECTION STATUS ===== */
        .connection-status {
            position: fixed;
            bottom: 15px;
            right: 15px;
            padding: 8px 12px;
            border: 0.5px solid #ffffff;
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.5);
            font-size: 0.65em;
            display: flex;
            align-items: center;
            gap: 6px;
            color: #ffffff;
            font-weight: 400;
            z-index: 1000;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulse 1s infinite;
        }

        .status-dot.connected { background: #ffe100; box-shadow: 0 0 8px #ffe100; }
        .status-dot.disconnected { background: #ff0000; animation: none; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .new-event { animation: slideIn 0.5s ease; }

        .archive-list::-webkit-scrollbar { width: 6px; }
        .archive-list::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.3); }
        .archive-list::-webkit-scrollbar-thumb { background: #ffe100; border-radius: 3px; }

        @media (min-width: 768px) {
            .status-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

    <p class="subtitle">UNAUTHORIZED ENTITY DETECTED</p>

        <div class="progress-label">REALITY STABILITY</div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
    </div>
