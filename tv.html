<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">


  
<title>Error Reality TV</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
body{
    margin:0;
    background:black;
    color:#ffd400;
    /* Zmieniamy czcionkę globalnie na Major Mono Display */
    font-family: 'Share Tech Mono', monospace;
    overflow:hidden;
}
body::before{
    content:'';
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;

    background:
    repeating-linear-gradient(
        transparent,
        transparent 2px,
        rgba(255,255,255,0.03) 3px
    );

    opacity:0.2;
}

.screen{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    width:100%;
}

#errorTitle{
    font-family: 'Share Tech Mono', monospace;
    font-size:min(220px,18vw);
    font-weight:100;
    letter-spacing:18px;
    /* Zostawiłem tylko mikro-cień, żeby litery były wyraźne na czarnym tle, bez wielkiej łuny */
    text-shadow: 0 0 2px #ffd400; 
    animation:flicker 3s infinite;
    
    /* FIX NA CENTROWANIE TYTUŁU: */
    position:relative;
    display: block;
    text-align: center;
    width: 100%;
}

#errorTitle::after{
    content:'ERROR';
    font-family: 'Share Tech Mono', monospace;
    color:#ff4fd8;
    opacity:0.2;
    animation:glitch 2s infinite;

    /* FIX NA CENTROWANIE GLITCHA: */
    position:absolute;
    top:0;
    left:0;
    right:0;
    margin: 0 auto;
    text-align: center;
}
#debugPanel{
    min-width:180px;
    position:fixed;

    right:40px;
    bottom:40px;

    display:flex;
    flex-direction:column;
    gap:10px;

    z-index:99999;
}
#debugPanel button{

    background:black;
    color:#ffd400;

    border:1px solid #ffd400;

    padding:10px 14px;

    font-family:'Share Tech Mono', monospace;

    cursor:pointer;
}

#debugPanel button:hover{

    background:#ffd400;
    color:black;
}

#message{
    color:#ff4fd8;
    text-transform:uppercase;
    letter-spacing:4px;
    font-size:36px;
    margin-top:30px;
    text-align: center; /* Wyśrodkowanie podtytułu */
}
#errorTitle::before{
    content:'ERROR';

    position:absolute;
    top:0;
    left:0;
    right:0;

    color:#00ffff;

    opacity:0.15;

    animation:glitch2 2.4s infinite;
}
    
#systemMessage{
    margin-top:20px;
    font-size:28px;
    min-height:40px;
    text-align: center; /* Wyśrodkowanie komunikatów */
}
    
#objective{
    margin-top:60px;
    font-size:26px;
    color:#ffd400;
    text-align: center; /* Wyśrodkowanie zadań */
}

.progress-wrapper{
    width:60%;
    height:24px;
    border:2px solid #ffd400;
    margin-top:40px;
    border-radius:20px;
    overflow:hidden;
}

.progress-fill{
    height:100%;
    width:0%;

    background:
    linear-gradient(
        90deg,
        #ffd400,
        #fff57a,
        #ffd400
    );

    box-shadow:
        0 0 15px #ffd400;

    border-radius:20px;

    transition:width 0.8s ease;
}

#percent{
    margin-top:15px;
    font-size:32px;
    text-align: center;
}

.system-message{
    color:#ffd400;
}

.anomaly-message{
    color:#ff4fd8;
}

.scanline{
    position:fixed;
    width:100%;
    height:4px;
    background:rgba(255,212,0,0.25);
    top:-10px;
    animation:scan 6s linear infinite;
}

    #anomalyOverlay{
    position:fixed;
    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    width:700px;
    max-width:80vw;

    border:3px solid #ff4fd8;

    background:rgba(0,0,0,0.95);

    padding:40px;

    text-align:center;

    color:#ff4fd8;

    display:none;

    z-index:9999;

    box-shadow:
        0 0 20px #ff4fd8,
        0 0 60px rgba(255,79,216,0.3);
}

#anomalyTitle{
    font-size:80px;
    letter-spacing:10px;
}

#anomalyText{
    margin-top:20px;
    font-size:28px;
}

@keyframes flicker{
    0%{opacity:1;}
    50%{opacity:0.8;}
    100%{opacity:1;}
}
@keyframes scan{
    from{
        top:-10px;
    }
    to{
        top:100%;
    }
}

@keyframes glitch2{

    0%{
        transform:translateX(0);
    }

    8%{
        transform:translateX(8px);
    }

    16%{
        transform:translateX(-8px);
    }

    24%{
        transform:translateX(0);
    }

    100%{
        transform:translateX(0);
    }

}


    
@keyframes glitch{
    0%{
        transform:translateX(0);
    }

    5%{
        transform:translateX(-12px);
    }

    10%{
        transform:translateX(12px);
    }

    15%{
        transform:translateX(-6px);
    }

    20%{
        transform:translateX(0);
    }

    100%{
        transform:translateX(0);
    }
}
</style>
</head>

<body>

<div class="screen">

<div id="errorTitle">ERROR</div>

<div id="message">
REALITY RECOVERY PROTOCOL ACTIVE
</div>

<div class="progress-wrapper">
<div class="progress-fill" id="fill"></div>
</div>
    
<div class="scanline"></div>
    
<div id="percent">0%</div>
<div id="systemMessage" class="system-message">
INITIALIZING...
</div>

    <div id="anomalyOverlay">

    <div id="anomalyTitle">
        ERROR
    </div>

    <div id="anomalyText">
        CORRUPTED STORAGE DETECTED
    </div>

</div>

    <button onclick="cleanupScene()">
SPRZATANIE
</button>

</div>

<script>

const ws = new WebSocket(
'wss://error-reality-server-1.onrender.com/ws'
);



function showAnomaly(text){

    const overlay =
    document.getElementById('anomalyOverlay');

    const label =
    document.getElementById('anomalyText');

    label.innerText = text;

    overlay.style.display = 'block';

    setTimeout(()=>{
        overlay.style.display = 'none';
    },4000);
}

let rebootSequenceStarted = false;

function sleep(ms){
    return new Promise(resolve =>
        setTimeout(resolve, ms)
    );
}

   

let startSceneTriggered = false;
    
    async function startRebootSequence(){

    if(rebootSequenceStarted)
        return;

    rebootSequenceStarted = true;

    const msg =
    document.getElementById('systemMessage');

    msg.innerText =
    'REBOOTING REALITY...';

    await sleep(3000);

    msg.innerText =
    'REBOOT FAILED';

    await sleep(3000);

    msg.innerText =
    'DATA MISSING';

    await sleep(3000);

    msg.innerText =
    'LOCATE SUBSTITUTE CORE';
}

    let finalSequenceStarted = false;

async function startFinalSequence(){

    if(finalSequenceStarted)
        return;

    finalSequenceStarted = true;

    const msg =
    document.getElementById('systemMessage');

    msg.innerText =
    'SUBSTITUTE CORE ACCEPTED';

    await sleep(3000);

    msg.innerText =
    'PERSONNEL PLEASE LEAVE REALITY AREA';

    await sleep(3000);

    msg.innerText =
'REALITY REBOOT COMMENCING';

await runScene(
    'error_end'
);

    /*
    tutaj później:
    Home Assistant
    balkon
    światła
    dym
    */
}
    
function handleGameState(game){

    const msg =
    document.getElementById('systemMessage');

    document.getElementById('percent').innerText =
    game.progress + '%';

    document.getElementById('fill').style.width =
    game.progress + '%';

    if(!game.power){

        msg.innerText =
        'LOCATE EXTERNAL POWER SOURCE';

        return;
    }
    if(
    game.power &&
    !startSceneTriggered
){

    startSceneTriggered = true;

    runScene('error_start');
}

    if(
        game.restored_modules.length === 0
    ){

        msg.innerText =
        'LOCATE EXTERNAL CODE MODULES';

    }

    else if(
        game.restored_modules.length < 4
    ){

        msg.innerText =
        'CLEAR UNLOCKED MODULE';

    }

    if(
    game.restored_modules.length >= 4 &&
    !rebootSequenceStarted
){

    startRebootSequence();

}
    

    if(
        game.duck_bad
    ){

        showAnomaly(
            'INVALID CORE DETECTED'
        );

        msg.innerText =
        'CORE VALIDATION FAILED';
    }

    if(game.duck_good){

    startFinalSequence();

}
}

window.debugState = (state)=>{

    handleGameState(state);

};
    function testBadFloppy(){

    showAnomaly(
        'DATA CORRUPTED'
    );

}

function testBadDuck(){

    showAnomaly(
        'INVALID CORE DETECTED'
    );

    document.getElementById(
        'systemMessage'
    ).innerText =
    'CORE VALIDATION FAILED';

}

function testGoodDuck(){

    document.getElementById(
        'systemMessage'
    ).innerText =
    'REBOOTING REALITY...';

}

function resetDebug(){

    document.getElementById(
        'systemMessage'
    ).innerText =
    'INITIALIZING...';

}

ws.onmessage = (event)=>{

    const data =
    JSON.parse(event.data);

    if(
        data.type !== 'STATE_UPDATE'
    ){
        return;
    }

    if(
        !data.game_state
    ){
        return;
    }

    handleGameState(
        data.game_state
    );
};

   async function cleanupScene(){

    await fetch(
        'https://TWOJ-BACKEND.onrender.com/cleanup',
        {
            method:'POST'
        }
    );
}
</script>

<div id="debugPanel">

<button onclick="testBadFloppy()">
BAD FLOPPY
</button>

<button onclick="testBadDuck()">
BAD DUCK
</button>

<button onclick="testGoodDuck()">
GOOD DUCK
</button>

<button onclick="resetDebug()">
RESET
</button>

</div>

</body>
</html>
